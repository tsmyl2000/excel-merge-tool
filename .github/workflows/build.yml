name: 打包Excel合并工具(Windows EXE)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl pyinstaller

      - name: 打包Windows单文件EXE
        run: pyinstaller -F -w excel_merge_gui.py

      - name: 上传打包好的EXE
        uses: actions/upload-artifact@v4
        with:
          name: excel-merge-tool
          path: dist/*.exe
